<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 1000px; /* Adjusted for three columns */
            max-width: 100%;
        }
        .image {
            width: 42%; /* One-third of the container */
            background: url('image/image.png') no-repeat center center;
            background-size: cover;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            width: 58%; /* Two-thirds for the form */
            padding: 40px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .form-group {
            width: 48%; /* Each form field takes half the row's width */
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #786152;
            border: none;
            margin-top: 20px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        .form-group button:hover {
            background-color:  #544025;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Image column -->
    <div class="image"></div>

    <!-- Two-column form layout -->
    <div class="form-container">
        <h2>Registration</h2>
        <form action="register.php" method="POST">
            <!-- First row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" required>
                </div>
            </div>

            <!-- Second row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="text" id="mobile" name="mobile" required>
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
            </div>

            <!-- Third row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="blood_group">Blood Group</label>
                    <select id="blood_group" name="blood_group" required>
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nid">NID Number</label>
                    <input type="text" id="nid" name="nid" required>
                </div>
            </div>

            <!-- Fourth row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="passport">Passport Number</label>
                    <input type="text" id="passport" name="passport" required>
                </div>
            </div>

            <!-- Fifth row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="emergency_contact">Emergency Contact Number</label>
                    <input type="text" id="emergency_contact" name="emergency_contact" required>
                </div>
                <div class="form-group">
                    <label for="emergency_address">Emergency Contact Address</label>
                    <input type="text" id="emergency_address" name="emergency_address" required>
                </div>
            </div>

            <!-- Sixth row (Password and Submit Button) -->
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <button type="submit">Register</button>
                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
